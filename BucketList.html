<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 버킷리스트</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Pen+Script&family=Gamja+Flower&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    h2 {
      font-family: 'Nanum Pen Script', cursive;
    }
  </style>
  <style>
    /* 기본 카드 디자인 (자유롭게 수정 가능) */
    .card::before {
      content: "";
      position: absolute;
      
      left: 55px;
      width: 100%;
      height: 100%;
    background-image: url(img/Painting_JE2_BE2.png);
      background-repeat: no-repeat;
      top: -50px;
  }
    
    .card {
      width: 300px;
      margin: 50px auto;
      padding : 15px 15px 35px 15px;
      border: 10px solid #b1937a;
      outline: #6f3403 solid 10px;
      background-position: center center;


      box-sizing: border-box;
      box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.15);
      background-image: url(img/desk.png);
      background-repeat: no-repeat;
      background-size: auto 100%;
    }

    .card:hover {
      transform: scale(1.05) rotate(0deg);
      z-index: 10;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .card h2 {
      color: #2c3e50;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    .card p {
      color: #444;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    /* 배지의 기준점이 되기 위한 필수 속성 */
    .card {
      position: relative;
    }





    /* 1. 배지 (absolute) 관련 CSS를 작성하세요 */
    .post {
      position: absolute;
      top: -15px;
      right: -10px;
      background: #5a5a5a;
      color: #fff;
      padding: 8px 12px;
      border-radius: 30%;
      box-shadow: 2px 3px 8px rgba(0, 0, 0, 0.2);
      transform: rotate(-10deg);
      /* 살짝 기울여서 붙임 */
    }

    /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */
    .secret {
      visibility: hidden;
      opacity: 0;
      /* 투명 처리 */

      font-family: 'Nanum Pen Script', cursive;
      color: #2c3e50;
      margin-top: 10px;
    }

    .card:hover .secret {
      visibility: visible;
      /* 카드에 마우스를 올리면 나타남 */
      opacity: 1;
    }
  </style>

</head>

<body>
  <div class="card">
    <span class="post">⛏🧱</span>

    <h2>✨ 정진이의 꿈</h2>
    <p>📚 1. 문학책 읽기</p>
    <p>📘 2. 토익 따기</p>
    <p class="secret">🔒 3년째 토익공부 중</p>

  </div>

</body>

</html>
